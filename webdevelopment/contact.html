        <h1>
            Contact me!
        </h1>
        
        <p>
            Have a question or want to reach out? Fill out the form below!
        </p>

        <form action="jchpfv@umsystem.edu" method="post" class="contact-form" enctype="text/plain">
            <div class="form">
                <label for="title">Title</label>
                <select id="title" name="title" required>
                    <option value="" disabled selected>Choose a title</option>
                    <option value="mr">Mr.</option>
                    <option value="ms">Ms.</option>
                    <option value="mrs">Mrs.</option>
                    <option value="dr">dr.</option>
                    <option value="other">other.</option>
                </select>

                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="inquiry-type">Type of Inquiry</label>
                <select id="inquiry-type" name="inquiry-type" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="general">General Question</option>
                    <option value="project">Career Inquiry</option>
                    <option value="coffee">Let's Chat!<option>
                </select>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>
            
                <button type="submit" class="resumeButton">Submit</button>
            </div>
        </form>
